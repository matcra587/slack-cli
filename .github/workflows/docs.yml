name: docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'includes/**'
      - 'zensical.toml'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# GitHub Pages allows only one deployment at a time. Cancel any in-flight
# deploy when a newer commit lands.
concurrency:
  group: pages
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    permissions:
      contents: read            # Required to check out the repo.
      pages: read               # Required for configure-pages to fetch the site's base URL.
    steps:
      - name: Checkout
        # clover: provider=auto constraint=minor
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Configure Pages
        # clover: provider=auto constraint=minor
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Set up Python
        # clover: provider=auto constraint=minor
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'

      - name: Install Zensical
        run: pip install zensical

      - name: Build site
        run: zensical build --clean --strict

      - name: Upload artifact
        # clover: provider=auto constraint=minor
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write              # Required to publish the artifact to GitHub Pages.
      id-token: write           # Required for the Pages deploy action's OIDC token exchange.
    steps:
      - name: Deploy
        id: deployment
        # clover: provider=auto constraint=minor
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
