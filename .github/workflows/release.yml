name: release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    environment: deploy
    permissions:
      contents: write           # Required to create GitHub releases and upload assets.
      id-token: write           # Required for cosign via OIDC.
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          install_args: --locked
          cache: false

      - name: Check release state
        id: release-state
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "exists=true" >>"${GITHUB_OUTPUT}"
            echo "release ${TAG_NAME} already exists; skipping GoReleaser publish"
          else
            echo "exists=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Run GoReleaser
        if: steps.release-state.outputs.exists != 'true'
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: ~> v2.15
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download release checksums
        if: steps.release-state.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          mkdir -p dist
          gh release download "${TAG_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern checksums.txt \
            --dir dist \
            --clobber

      # GitHub artifact attestations are not available for user-owned private repositories.
      # Re-enable this if the repository becomes public or GitHub supports this repository type.
      # - name: Attest release artifact provenance
      #   if: steps.release-state.outputs.exists != 'true'
      #   uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
      #   with:
      #     subject-checksums: dist/checksums.txt

      - name: Create Homebrew tap token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Publish Homebrew formula
        uses: matcra587/github-actions/packages/homebrew-publish-formula@6e3053f35d4ec31adc4f82c04a2c43209f3b36e6 # homebrew/v0.1.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          tap: matcra587/homebrew-tap
          name: slick
          desc: Headless Slack CLI for agents, scripts, and CI jobs
          homepage: https://github.com/matcra587/slack-cli
          version: ${{ github.ref_name }}
          binary-name: slick
          module-path: github.com/matcra587/slack-cli
          build-package: ./cmd/slick
          commit-message: "slick: v{version}"
