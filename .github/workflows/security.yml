---
name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly advisory sweep — new CVEs land without commits.
    - cron: "0 12 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    name: Security
    # clover: provider=auto constraint=minor tag-prefix=security/ tags=actions
    uses: matcra587/github-actions/.github/workflows/security.yml@8ac690a9ce57ff20ff105dbdb99989a1bf7fd9f4 # security/v0.3.2
    permissions:
      contents: read
