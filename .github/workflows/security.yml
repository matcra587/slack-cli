---
name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly advisory sweep — new CVEs land without commits.
    - cron: "0 12 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.sha || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security:
    name: Security
    # clover: provider=auto constraint=minor tag-prefix=security/ tags=actions
    uses: matcra587/github-actions/.github/workflows/security.yml@3e61d37c312b21e008fa58eda8844a70b6a24f9d # security/v0.4.0
    permissions:
      contents: read
      security-events: write # SARIF + CodeQL uploads to code scanning.
    with:
      sarif: true
