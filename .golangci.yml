version: "2"

run:
  timeout: 5m
  relative-path-mode: cfg
  tests: true

linters:
  # Reasonable default set, then explicitly enable important ones.
  default: standard

  enable:
    # Core correctness / safety
    - bodyclose
    - errcheck
    - errorlint
    - govet
    - gosec
    - ineffassign
    - misspell
    - staticcheck
    - unused

    # Robustness
    - contextcheck
    - containedctx
    - durationcheck
    - sqlclosecheck
    - nolintlint

    # Import governance and modernization
    - depguard
    - modernize
    # gocritic intentionally not enabled: it produces ~57 findings requiring
    # pointer-vs-value refactor decisions (hugeParam, rangeValCopy, builtinShadow,
    # unnamedResult). Enable once those are addressed in a dedicated cleanup pass.

  settings:
    depguard:
      rules:
        main:
          list-mode: lax
          files:
            - "$all"
          allow:
            - $gostd
            - github.com/gechr/clog
          deny:
            - pkg: "log"
              desc: "use github.com/gechr/clog instead of the standard log package"
            - pkg: "log/slog"
              desc: "use github.com/gechr/clog instead of log/slog"
            - pkg: "io/ioutil"
              desc: "deprecated since Go 1.16; use io and os packages"

    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style

    gosec:
      # gosec.includes is an explicit allow-list. Dropping it would surface
      # G104/G112/G115/G117/G120/G122/G602; those need real fixes (integer overflow
      # conversions, ReadHeaderTimeout, unhandled close errors, multipart bounds)
      # before the allow-list can be removed.
      includes:
        - G101
        - G102
        - G103
        - G106
        - G107
        - G108
        - G109
        - G110
        - G111
        - G201
        - G202
        - G203
        - G204
        - G301
        - G302
        - G303
        - G304
        - G305
        - G306
        - G307
        - G401
        - G402
        - G403
        - G404
        - G501
        - G502
        - G503
        - G504
      config:
        G101:
          pattern: "(?i)passwd|pass|password|pwd|secret|private_key|token|api_key"
          ignore_entropy: false
          entropy_threshold: "80.0"
          per_char_threshold: "3.0"
          truncate: "32"
        G306: "0750"
        global:
          audit: enabled
          nosec: enabled

    misspell:
      locale: US

    nolintlint:
      require-specific: true
      require-explanation: true

  exclusions:
    rules:
      - path: '(.+_test\.go|^internal/testutil/)'
        linters:
          - gosec
        text: "G101|G204|G304|G306"
      # Omitempty semantics are intentional for the JSON/YAML contract here:
      # tests assert empty-struct omission (output_test.go) and the manifest
      # contract requires stable diffs; converting to omitzero would change
      # observable output. Do not "fix" until that contract is reviewed.
      - path: 'internal/cli/manifest/manifest\.go'
        linters:
          - modernize
        text: 'Omitempty has no effect on nested struct fields'
      - path: 'internal/config/workspace\.go'
        linters:
          - modernize
        text: 'Omitempty has no effect on nested struct fields'
issues:
  max-issues-per-linter: 0
  max-same-issues: 3

formatters:
  enable:
    - gofumpt
  settings:
    gofumpt:
      extra-rules: true
