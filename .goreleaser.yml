# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: slack-cli
report_sizes: true

metadata:
  mod_timestamp: "{{ .CommitTimestamp }}"

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: slack-cli
    main: ./cmd/slick
    binary: slick
    mod_timestamp: "{{ .CommitTimestamp }}"
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X '{{ .ModulePath }}/internal/version.Version={{ .Version }}'
      - -X '{{ .ModulePath }}/internal/version.Commit={{ .ShortCommit }}'
      - -X '{{ .ModulePath }}/internal/version.Branch={{ .Branch }}'
      - -X '{{ .ModulePath }}/internal/version.BuildTime={{ .CommitDate }}'
      - -X '{{ .ModulePath }}/internal/version.BuildBy=goreleaser'

archives:
  - name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    formats:
      - tar.gz

checksum:
  name_template: checksums.txt

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - "sign-blob"
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^style:'
      - '^chore:'
      - '^ci:'
      - '^test:'
