#:schema https://mise.en.dev/schema/mise.json
min_version = "2026.5.0"

[settings]
lockfile = true

[tools]
# clover: provider=auto constraint=minor
go = "1.26.3"
actionlint = "latest"
goreleaser = "latest"
cosign = "latest"
zizmor = "latest"
rumdl = "latest"
hk = "latest"
pkl = "latest"
shellcheck = "latest"

[env]
HK_MISE = 1
MODULE = "github.com/matcra587/slack-cli"
BINARY_NAME = "slick"
DIST_DIR = "./dist"

[task_config]
includes = ["tasks.toml"]
