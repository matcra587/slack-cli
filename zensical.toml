[project]
site_name = "slick"
site_description = "A headless Slack CLI for agents, scripts, and CI jobs."
site_url = "https://matcra587.github.io/slack-cli/"
repo_url = "https://github.com/matcra587/slack-cli"
repo_name = "matcra587/slack-cli"
edit_uri = "edit/main/docs/"
copyright = """
Copyright &copy; 2026 Matt Craven &middot; MIT licence.<br>
<em>slick is an independent project &mdash; not affiliated with, sponsored by, or endorsed by Slack Technologies, LLC. Slack is a trademark and service mark of Slack Technologies, Inc., registered in the U.S. and in other countries.</em>
"""

docs_dir = "docs"
site_dir = "site"

extra_css = ["stylesheets/github.css", "stylesheets/catppuccin.css"]

nav = [
    { Overview = "index.md" },
    { Installation = "installation.md" },
    { Auth = "auth.md" },
    { Messaging = [
        { message = "message.md" },
        { reply = "reply.md" },
        { react = "react.md" },
        { history = "history.md" },
    ] },
    { Discovery = [
        { lookup = "lookup.md" },
        { cache = "cache.md" },
    ] },
    { "User profile" = [
        { status = "status.md" },
    ] },
    { Health = [
        { health = "health.md" },
    ] },
    { Files = [
        { "file (probationary)" = "file.md" },
    ] },
    { Configuration = [
        { config = "config.md" },
        { workspace = "workspace.md" },
        { manifest = "manifest.md" },
    ] },
    { "Agent tooling" = [
        { agent = "agent.md" },
    ] },
    { Reference = [
        { version = "version.md" },
    ] },
]

# ----------------------------------------------------------------------------
# Validation — fail the (--strict) build on broken links, anchors, and refs.
# ----------------------------------------------------------------------------
[project.validation]
unresolved_references = true
unresolved_footnotes = true
unused_definitions = true
unused_footnotes = true
shadowed_definitions = true
shadowed_footnotes = true
invalid_links = true
invalid_link_anchors = true

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
font.text = "Geist"
font.code = "Geist Mono"
features = [
    "navigation.tracking",
    "navigation.tabs",
    "navigation.sections",
    "navigation.top",
    "navigation.footer",
    "header.autohide",
    "search.suggest",
    "search.highlight",
    "content.code.copy",
    "content.code.annotate",
    "content.tabs.link",
    "content.action.edit",
    "content.action.view",
]

[project.theme.icon]
logo = "material/console"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to system preference"

# ----------------------------------------------------------------------------
# Extras
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/matcra587/slack-cli"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations.md"]
[project.markdown_extensions.pymdownx.tilde]

# Mermaid renders through a SuperFences custom fence; zensical takes the
# fence formatter as a plain dotted string (no YAML !!python/name tag).
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
